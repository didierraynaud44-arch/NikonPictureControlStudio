<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Nikon Picture Control Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Nikon Picture Control Studio</h1>


<div class="toolbar">

    <button id="openNef">
        📂 Ouvrir un NEF
    </button>

</div>


<div class="workspace">


    <div class="photo-panel">

        <h2>Aperçu</h2>

        <img id="previewImage">

    </div>



    <div class="info-panel">

        <h2>Informations NEF</h2>

        <div id="status">
            Aucun fichier chargé
        </div>

    </div>


</div>



<div class="picture-control-panel">

    <h2>Picture Control Nikon</h2>

    <div id="pictureControlStatus">
        Aucun Picture Control chargé
    </div>

</div>



<script src="app.js"></script>

</body>

</html>
